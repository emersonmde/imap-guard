services:
  imap-guard:
    build: .
    ports:
      # IMAP port — exposed on all interfaces; restrict via firewall if needed
      - "1143:1143"
      # Bind health endpoint to localhost — not exposed externally
      - "127.0.0.1:8080:8080"
    environment:
      IMAP_GUARD_LISTEN: ":1143"
      IMAP_GUARD_UPSTREAM: "imap.gmail.com:993"
      IMAP_GUARD_UPSTREAM_TLS: "tls"
      IMAP_GUARD_CONFIG: "/etc/imap-guard/rules.yaml"
      IMAP_GUARD_HEALTH_LISTEN: ":8080"
      IMAP_GUARD_LOG_FORMAT: "json"
    volumes:
      # Mount rules config read-only; see imap-guard.yaml for example ACL rules
      - ./imap-guard.yaml:/etc/imap-guard/rules.yaml:ro
    restart: unless-stopped
